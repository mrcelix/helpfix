name: Build & Deploy to Hostinger

# main branch'e her push'ta çalışır: bağımlılıkları kurar, prod build
# alır, ve TEK bir FTP oturumunda İKİ hedefi birleştirip yükler:
#   - landing/  (tanıtım sitesi)   → public_html/ kökü         (helpfix.io)
#   - dist/     (React uygulaması) → public_html/itsm/          (itsm.helpfix.io)
#
# NOT: Önceden bu iki hedef için AYRI AYRI iki FTP-Deploy-Action adımı
# vardı, ama Hostinger'ın FTP sunucusu zaman zaman "Timeout (control
# socket)" hatası veriyor (bu action'ın GitHub'daki issue'larında da
# sıkça karşılaşılan, bilinen bir sorun) — iki ayrı bağlantı açmak bu
# riski ikiye katlıyordu. Şimdi build sırasında iki klasörü tek bir
# staging klasöründe (deploy-staging/) birleştirip TEK FTP oturumuyla
# yüklüyoruz; bağlantı kopma riski yarıya iniyor ve itsm/ klasörünü
# yanlışlıkla silme riski de (artık kaynağın parçası olduğu için)
# tamamen ortadan kalkıyor.
#
# ÖNEMLİ — TEK SEFERLİK MANUEL ADIM: Hostinger hPanel'de "itsm" adında
# bir alt alan adı oluşturup belge kökünü public_html/itsm olarak
# ayarlamanız gerekiyor (bu adım panelden yapılıyor, buradan
# otomatikleştirilemiyor).
on:
  push:
    branches: [main]
  workflow_dispatch: {} # Actions sekmesinden manuel de tetiklenebilir

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Ortam değişkenlerini doğrula (teşhis)
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "::error::VITE_SUPABASE_URL secret'ı BOŞ veya tanımsız!"
            exit 1
          else
            echo "VITE_SUPABASE_URL tanımlı, uzunluk: ${#VITE_SUPABASE_URL_CHECK} (değer gizli)"
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY secret'ı BOŞ veya tanımsız!"
            exit 1
          fi
          echo "Her iki secret da dolu görünüyor ✓"
        env:
          VITE_SUPABASE_URL_CHECK: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Prod build al
        run: npm run build
        env:
          # Bu iki değer GitHub repo → Settings → Secrets and variables →
          # Actions kısmından eklenir. Supabase anon key public olduğu
          # için güvenlik riski değildir, ama secrets'ta tutmak temiz
          # bir pratiktir.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # "Powered By HelpFix" popup'ındaki sürüm/son deploy bilgisi
          # için — secret değil, GitHub'ın kendi sağladığı bağlam
          # değerleri, her deploy'da otomatik güncel.
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp || '' }}

      - name: Deploy klasörünü birleştir (landing kökte, uygulama itsm/ altında)
        run: |
          mkdir -p deploy-staging
          cp -r landing/. deploy-staging/
          mkdir -p deploy-staging/itsm
          cp -r dist/. deploy-staging/itsm/
          echo "Staging klasörü hazır:"
          ls -la deploy-staging/
          ls -la deploy-staging/itsm/

      - name: Hostinger'a TEK FTP oturumuyla yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy-staging/
          # KESİN DOĞRULAMA (srv1381-files.hstgr.io özel dosya yöneticisi
          # ile teyit edildi): bu FTP hesabının kök dizini ("/") zaten
          # gerçek public_html ile birebir aynı yer.
          server-dir: ./
          log-level: verbose
          timeout: 60000

