name: Build & Deploy to Hostinger

# main branch'e her push'ta çalışır: bağımlılıkları kurar, prod build
# alır, ve İKİ AYRI FTP hedefine yükler:
#   - dist/     (React uygulaması) → public_html/itsm/   (itsm.SIZINALANADI.com)
#   - landing/  (tanıtım sitesi)   → public_html/         (SIZINALANADI.com kökü)
#
# ÖNEMLİ — TEK SEFERLİK MANUEL ADIM: Hostinger hPanel'de "itsm" adında
# bir alt alan adı (subdomain) oluşturup belge kökünü (document root)
# public_html/itsm olarak ayarlamanız gerekiyor. Bu, Hostinger panelinden
# yapılan bir işlem — buradan otomatikleştirilemez. Alt alan adını
# oluşturduktan sonra bu workflow otomatik olarak doğru klasöre yükleme
# yapacak (Hostinger genelde subdomain'i siz oluşturduğunuzda ilgili
# klasörü de otomatik açar).
on:
  push:
    branches: [main]
  workflow_dispatch: {} # Actions sekmesinden manuel de tetiklenebilir

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Ortam değişkenlerini doğrula (teşhis)
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "::error::VITE_SUPABASE_URL secret'ı BOŞ veya tanımsız!"
            exit 1
          else
            echo "VITE_SUPABASE_URL tanımlı, uzunluk: ${#VITE_SUPABASE_URL_CHECK} (değer gizli)"
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::VITE_SUPABASE_ANON_KEY secret'ı BOŞ veya tanımsız!"
            exit 1
          fi
          echo "Her iki secret da dolu görünüyor ✓"
        env:
          VITE_SUPABASE_URL_CHECK: ${{ secrets.VITE_SUPABASE_URL }}

      - name: Prod build al
        run: npm run build
        env:
          # Bu iki değer GitHub repo → Settings → Secrets and variables →
          # Actions kısmından eklenir. Supabase anon key public olduğu
          # için güvenlik riski değildir, ama secrets'ta tutmak temiz
          # bir pratiktir.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Uygulamayı itsm/ alt klasörüne yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          # KESİN DOĞRULAMA (srv1381-files.hstgr.io özel dosya yöneticisi
          # ile teyit edildi): bu FTP hesabının kök dizini ("/") zaten
          # gerçek public_html ile birebir aynı yer. Uygulama artık itsm
          # alt alan adının belge kökü olan public_html/itsm/'e gidiyor.
          server-dir: ./itsm/
          log-level: verbose

      - name: Tanıtım sitesini kök dizine yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./landing/
          server-dir: ./
          log-level: verbose
          # itsm/ alt klasörünü ve uygulamanın kendi dosyalarını asla silme
          exclude: |
            itsm/**

